# Kael OS - Configuración de Yazi File Manager
# Tema e Integración por Defecto

[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "name"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
tab_size        = 4
max_width       = 1920
max_height      = 1080
image_quality   = 85
image_filter    = "lanczos3"

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', block = true, desc = "Edit" }
]
play = [
    { run = 'mpv "$@"', orphan = true, desc = "Play" }
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" }
]

[open]
rules = [
    { url = "*.txt", use = "edit" },
    { mime = "text/*", use = "edit" },
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
    { mime = "application/pdf", use = "open" },
    { mime = "image/*", use = "open" }
]
