# Kael OS - Configuración de Kitty Terminal
# Tema: Cyber-Rasta

# ─── FUENTES ──────────────────────────────────────────────────────────
font_family      Roboto Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ─── DISEÑO Y VENTANA ──────────────────────────────────────────────────
remember_window_size    no
initial_width           950
initial_height          600
window_padding_width    8
confirm_os_window_close 0
enable_audio_bell       no

# ─── CURSOR ───────────────────────────────────────────────────────────
cursor                  #00e676
cursor_text_color       #0c0c0e
cursor_shape            beam
cursor_beam_thickness   1.5

# ─── BARRA DE PESTAÑAS (TABS) ─────────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #0c0c0e
active_tab_background   #00e676
inactive_tab_foreground #e0e0e0
inactive_tab_background #1a1a1e

# ─── PALETA DE COLORES (CYBER-RASTA) ──────────────────────────────────
background              #0c0c0e
foreground              #e0e0e0
selection_background    #1a1a1e
selection_foreground    #e0e0e0
url_color               #00e676

# Black
color0                  #0c0c0e
color8                  #4e4e54

# Red
color1                  #ff3a3a
color9                  #ff3a3a

# Green
color2                  #00e676
color10                 #00e676

# Yellow
color3                  #ffdf00
color11                 #ffdf00

# Blue
color4                  #2979ff
color12                 #2979ff

# Magenta
color5                  #e040fb
color13                 #e040fb

# Cyan
color6                  #00e5ff
color14                 #00e5ff

# White
color7                  #e0e0e0
color15                 #ffffff
