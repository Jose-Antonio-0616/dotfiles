# Kael OS - Configuración de MPV Media Player
# Diseño: Minimalista y sin bordes

# ─── VIDEO Y VENTANA ──────────────────────────────────────────────────
border=no                   # Ventana completamente sin bordes
keep-open=yes               # Mantener abierto al finalizar el video
autofit-larger=70%x70%      # Limitar tamaño inicial de ventana flotante
hwdec=auto                  # Decodificación por hardware automática

# ─── SUBTÍTULOS Y AUDIO ───────────────────────────────────────────────
sub-auto=fuzzy              # Cargar subtítulos locales automáticamente
audio-file-auto=fuzzy       # Cargar pistas de audio externas
volume=80                   # Volumen inicial por defecto
volume-max=150              # Permitir amplificación hasta 150%
